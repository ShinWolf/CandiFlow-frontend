<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <!-- Accent glow green-700 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15803d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip path for hexagon -->
    <clipPath id="hexClip">
      <polygon points="100,10 182,55 182,145 100,190 18,145 18,55"/>
    </clipPath>
  </defs>

  <!-- Background hexagon -->
  <polygon points="100,10 182,55 182,145 100,190 18,145 18,55"
    fill="url(#bgGrad)" stroke="none"/>

  <!-- Outer hex border glow -->
  <polygon points="100,10 182,55 182,145 100,190 18,145 18,55"
    fill="none" stroke="url(#accentGrad)" stroke-width="1.5"
    opacity="0.9" filter="url(#glow)"/>

  <!-- Inner hex border (subtle) -->
  <polygon points="100,22 171,62 171,138 100,178 29,138 29,62"
    fill="none" stroke="#15803d" stroke-width="0.4" opacity="0.2"/>

  <!-- Corner circuit dots -->
  <circle cx="100" cy="10" r="3" fill="#15803d" filter="url(#glow)" opacity="0.9"/>
  <circle cx="182" cy="55" r="3" fill="#16a34a" filter="url(#glow)" opacity="0.9"/>
  <circle cx="182" cy="145" r="3" fill="#22c55e" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="190" r="3" fill="#22c55e" filter="url(#glow)" opacity="0.9"/>
  <circle cx="18" cy="145" r="3" fill="#16a34a" filter="url(#glow)" opacity="0.9"/>
  <circle cx="18" cy="55" r="3" fill="#15803d" filter="url(#glow)" opacity="0.9"/>

  <!-- Subtle grid lines inside hex -->
  <g clip-path="url(#hexClip)" opacity="0.06" stroke="#15803d" stroke-width="0.5">
    <line x1="18" y1="80" x2="182" y2="80"/>
    <line x1="18" y1="100" x2="182" y2="100"/>
    <line x1="18" y1="120" x2="182" y2="120"/>
    <line x1="70" y1="10" x2="70" y2="190"/>
    <line x1="100" y1="10" x2="100" y2="190"/>
    <line x1="130" y1="10" x2="130" y2="190"/>
  </g>

  <!-- C letter (arc style) -->
  <g filter="url(#softGlow)" fill="url(#accentGrad)">
    <!-- C outer arc approximated with path -->
    <!-- Top bar -->
    <rect x="52" y="68" width="38" height="9" rx="1"/>
    <!-- Left vertical bar -->
    <rect x="52" y="68" width="9" height="64" rx="1"/>
    <!-- Bottom bar -->
    <rect x="52" y="123" width="38" height="9" rx="1"/>
    <!-- Top-right inner cut (makes it C not O) -->
    <!-- already open on right by not having a right bar -->
  </g>

  <!-- F letter -->
  <g filter="url(#softGlow)" fill="url(#accentGrad)">
    <!-- F vertical bar -->
    <rect x="109" y="68" width="9" height="64" rx="1"/>
    <!-- F top bar -->
    <rect x="109" y="68" width="38" height="9" rx="1"/>
    <!-- F middle bar -->
    <rect x="109" y="96" width="30" height="8" rx="1"/>
  </g>

  <!-- Separator line between C and F -->
  <line x1="103" y1="75" x2="103" y2="125"
    stroke="url(#accentGrad)" stroke-width="0.6" opacity="0.3"/>

  <!-- Bottom label -->
  <text x="100" y="175" text-anchor="middle"
    font-family="monospace" font-size="9" letter-spacing="4"
    fill="#15803d" opacity="0.5">APP</text>

</svg>
